<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade DOM - Interatividade</title>
</head>
<body>
    <h1>Atividade Interativa - DOM</h1>
    
    <h2>Contador de Cliques</h2>
    <button id="btnDecrement">Decrementar</button>
    <span id="counterDisplay">0</span>
    <button id="btnIncrement">Incrementar</button>
    
    <br><br>
    
    <h2>Adicionar Texto Dinâmico</h2>
    <input type="text" id="textInput" placeholder="Digite sua mensagem e pressione Enter...">
    <p id="charCounter">Caracteres (sem espaços): 0</p>
    
    <br>
    
    <h2>Adicionar Novo Item</h2>
    <select id="itemType">
        <option value="ul">Lista Não Ordenada (ul)</option>
        <option value="ol">Lista Ordenada (ol)</option>
    </select>
    <button id="btnAddItem">Adicionar Item</button>
    
    <br><br>
    
    <button id="btnReset">Resetar Tudo</button>
    
    <hr>
    
    <h3>Conteúdo Adicionado:</h3>
    <div id="dynamicContent"></div>
    
    <script src="script.js"></script>
</body>
</html>
